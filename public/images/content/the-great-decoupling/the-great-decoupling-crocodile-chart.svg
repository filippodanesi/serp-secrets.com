<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="640" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="48" y="36" font-size="11" font-weight="500" letter-spacing="0.05em" fill="#737373" text-transform="uppercase">THE CROCODILE CHART</text>
  <text x="48" y="58" font-size="15" font-weight="500" fill="#171717">Impressions vs Clicks Divergence</text>

  <!-- Chart area -->
  <g transform="translate(48, 80)">
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="544" y2="0" stroke="#e5e5e5" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="544" y2="50" stroke="#e5e5e5" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="544" y2="100" stroke="#e5e5e5" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="544" y2="150" stroke="#e5e5e5" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="544" y2="200" stroke="#e5e5e5" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="544" y2="250" stroke="#e5e5e5" stroke-width="0.5"/>

    <!-- Y-axis labels -->
    <text x="-8" y="4" font-size="10" fill="#a3a3a3" text-anchor="end">+60%</text>
    <text x="-8" y="54" font-size="10" fill="#a3a3a3" text-anchor="end">+40%</text>
    <text x="-8" y="104" font-size="10" fill="#a3a3a3" text-anchor="end">+20%</text>
    <text x="-8" y="154" font-size="10" fill="#a3a3a3" text-anchor="end">0%</text>
    <text x="-8" y="204" font-size="10" fill="#a3a3a3" text-anchor="end">-20%</text>
    <text x="-8" y="254" font-size="10" fill="#a3a3a3" text-anchor="end">-40%</text>

    <!-- X-axis labels -->
    <text x="0" y="272" font-size="10" fill="#a3a3a3" text-anchor="start">Jul 2024</text>
    <text x="136" y="272" font-size="10" fill="#a3a3a3" text-anchor="middle">Oct 2024</text>
    <text x="272" y="272" font-size="10" fill="#a3a3a3" text-anchor="middle">Jan 2025</text>
    <text x="408" y="272" font-size="10" fill="#a3a3a3" text-anchor="middle">Apr 2025</text>
    <text x="544" y="272" font-size="10" fill="#a3a3a3" text-anchor="end">Aug 2025</text>

    <!-- Baseline (0%) -->
    <line x1="0" y1="150" x2="544" y2="150" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- The gap fill (crocodile mouth) -->
    <path d="M 0,150 C 68,145 136,125 204,105 C 272,85 340,55 408,35 C 442,25 510,12 544,5
             L 544,190 C 510,195 442,200 408,205 C 340,215 272,220 204,215 C 136,210 68,175 0,150 Z"
          fill="#171717" fill-opacity="0.04"/>

    <!-- Impressions line (upper jaw) -->
    <path d="M 0,150 C 68,145 136,125 204,105 C 272,85 340,55 408,35 C 442,25 510,12 544,5"
          fill="none" stroke="#171717" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Clicks line (lower jaw) -->
    <path d="M 0,150 C 68,175 136,210 204,215 C 272,220 340,215 408,205 C 442,200 510,195 544,190"
          fill="none" stroke="#a3a3a3" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Data points - Impressions -->
    <circle cx="0" cy="150" r="3" fill="#171717"/>
    <circle cx="136" cy="125" r="3" fill="#171717"/>
    <circle cx="272" cy="85" r="3" fill="#171717"/>
    <circle cx="408" cy="35" r="3" fill="#171717"/>
    <circle cx="544" cy="5" r="3" fill="#171717"/>

    <!-- Data points - Clicks -->
    <circle cx="0" cy="150" r="3" fill="#a3a3a3"/>
    <circle cx="136" cy="210" r="3" fill="#a3a3a3"/>
    <circle cx="272" cy="220" r="3" fill="#a3a3a3"/>
    <circle cx="408" cy="205" r="3" fill="#a3a3a3"/>
    <circle cx="544" cy="190" r="3" fill="#a3a3a3"/>

    <!-- Annotations -->
    <text x="544" y="-8" font-size="11" font-weight="600" fill="#171717" text-anchor="end">+54%</text>
    <text x="544" y="208" font-size="11" font-weight="600" fill="#a3a3a3" text-anchor="end">-30%</text>

    <!-- Gap annotation -->
    <line x1="480" y1="18" x2="480" y2="192" stroke="#171717" stroke-width="0.75" stroke-dasharray="3,3"/>
    <text x="472" y="112" font-size="10" font-weight="500" fill="#737373" text-anchor="end">AI Overview</text>
    <text x="472" y="124" font-size="10" font-weight="500" fill="#737373" text-anchor="end">gap</text>
  </g>

  <!-- Legend -->
  <g transform="translate(48, 358)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#171717" stroke-width="2.5"/>
    <text x="22" y="4" font-size="11" fill="#171717">Impressions</text>
    <line x1="100" y1="0" x2="116" y2="0" stroke="#a3a3a3" stroke-width="2.5"/>
    <text x="122" y="4" font-size="11" fill="#a3a3a3">Clicks</text>
    <text x="544" y="4" font-size="9" fill="#a3a3a3" text-anchor="end">Source: BrightEdge, Kevin Indig Growth Memo</text>
  </g>
</svg>
